{% set name = "conda-exec" %}
{% set version = "0.3.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/conda-exec/conda_exec-{{ version }}.tar.gz
  sha256: 2669a204c55b1c9a70305dd3fb5b69da7e868dcdf676a503014d6000c4a3cf0f

build:
  noarch: python
  number: 0
  entry_points:
    - ce = conda_exec.main:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}.*
    - pip
    - hatchling >=1.12.2
    - hatch-vcs >=0.2.0
  run:
    - python >={{ python_min }}
    - conda >=25.1
    - packaging >=22.0
    - tomli >=1.0

test:
  imports:
    - conda_exec
  commands:
    - ce --help
    - conda exec --help
    - pip check
  requires:
    - pip

about:
  home: https://github.com/conda-incubator/conda-exec
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Ephemeral package execution for conda
  description: |
    conda-exec lets you run conda packages without installing them permanently.
    It creates cached, isolated environments on demand and also supports
    PEP 723 script metadata workflows.
  dev_url: https://github.com/conda-incubator/conda-exec
  doc_url: https://conda-incubator.github.io/conda-exec

extra:
  recipe-maintainers:
    - jezdez
    - sodre
